name: Publish Frontend Image

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".dockerignore"
  workflow_dispatch:

concurrency:
  group: frontend-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      LOCAL_IMAGE_REF: localbuild/frontend:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: frontend/Dockerfile.prod
          pull: true
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Frontend Image
        uses: ./.github/actions/container-scan
        with:
          image-ref: ${{ env.LOCAL_IMAGE_REF }}

      - name: Push Frontend Image
        uses: ./.github/actions/ecr-build-push
        with:
          ecr-repository: ${{ vars.FRONTEND_ECR_REPOSITORY }}
          image-name: frontend
          local-image-ref: ${{ env.LOCAL_IMAGE_REF }}
