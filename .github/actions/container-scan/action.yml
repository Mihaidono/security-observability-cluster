name: Container Scan
description: Scan a local container image with Trivy and fail on configured severities.

inputs:
  image-ref:
    description: Local image reference to scan.
    required: true
  severity:
    description: Comma-separated Trivy severity list.
    required: false
    default: HIGH,CRITICAL
  ignore-unfixed:
    description: Ignore vulnerabilities without fixes.
    required: false
    default: "true"
  skip-files:
    description: Comma-separated list of files to exclude from the Trivy scan.
    required: false
    default: ""
  trivy-version:
    description: Trivy version to install for the scan.
    required: false
    default: v0.72.0

runs:
  using: composite
  steps:
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: table
        exit-code: "1"
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        skip-files: ${{ inputs.skip-files }}
        vuln-type: os,library
        severity: ${{ inputs.severity }}
        version: ${{ inputs.trivy-version }}
        scanners: vuln
      env:
        TRIVY_DISABLE_VEX_NOTICE: "true"
        TRIVY_SKIP_VERSION_CHECK: "true"
