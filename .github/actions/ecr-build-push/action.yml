name: Push Image To ECR
description: Tag a prebuilt local Docker image and push it to Amazon ECR using GitHub OIDC.

inputs:
  ecr-repository:
    description: Existing ECR repository name.
    required: true
  image-name:
    description: Logical image name used in workflow summaries.
    required: true
  local-image-ref:
    description: Local Docker image reference to retag and push.
    required: true

runs:
  using: composite
  steps:
    - name: Login To Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Tag And Push Image
      shell: bash
      run: |
        set -euo pipefail
        local_image="${{ inputs.local-image-ref }}"
        remote_base="${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}"

        docker tag "$local_image" "$remote_base:${{ github.sha }}"
        docker tag "$local_image" "$remote_base:latest"

        docker push "$remote_base:${{ github.sha }}"
        docker push "$remote_base:latest"

    - name: Job Summary
      shell: bash
      run: |
        {
          echo "## Image published"
          echo
          echo "- Image: \`${{ inputs.image-name }}\`"
          echo "- Repository: \`${{ inputs.ecr-repository }}\`"
          echo "- Tags:"
          echo "  - \`${{ github.sha }}\`"
          echo "  - \`latest\`"
        } >> "$GITHUB_STEP_SUMMARY"
