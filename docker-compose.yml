services:
  postgres:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_DB: isolens
      POSTGRES_USER: isolens
      POSTGRES_PASSWORD: isolens-dev-password-change-me
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    init: true
    user: "${BACKEND_UID:-1000}:${BACKEND_GID:-1000}"
    working_dir: /app/backend
    env_file:
      - backend/.env
    environment:
      HOME: /home/backend
      AWS_SDK_LOAD_CONFIG: ${AWS_SDK_LOAD_CONFIG:-true}
      AWS_CONFIG_FILE: /home/backend/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /home/backend/.aws/credentials
      ISOLENS_DATABASE_URL: postgresql://isolens:isolens-dev-password-change-me@postgres:5432/isolens
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./infrastructure:/app/infrastructure
      - ${HOME}/.aws:/home/backend/.aws
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app/frontend
    depends_on:
      - backend
    environment:
      VITE_API_TOKEN: ${VITE_API_TOKEN:-dev-token}
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  frontend_node_modules:
  postgres_data:
