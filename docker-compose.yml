services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    init: true
    working_dir: /app/backend
    env_file:
      - backend/.env
    environment:
      AWS_SDK_LOAD_CONFIG: ${AWS_SDK_LOAD_CONFIG:-true}
      AWS_CONFIG_FILE: ${AWS_CONFIG_FILE:-/root/.aws/config}
      AWS_SHARED_CREDENTIALS_FILE: ${AWS_SHARED_CREDENTIALS_FILE:-/root/.aws/credentials}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./infrastructure:/app/infrastructure
      - ${HOME}/.aws:/root/.aws:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app/frontend
    depends_on:
      - backend
    environment:
      VITE_API_TOKEN: ${VITE_API_TOKEN:-dev-token}
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  frontend_node_modules:
